<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BorcTracker</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f8f9fc;
  --surface:#ffffff;
  --surface2:#f2f4f8;
  --border:#e3e7f0;
  --border2:#cdd3e3;
  --rose:#e53935;--rose-s:#fff0f0;--rose-m:rgba(229,57,53,0.15);
  --teal:#0d7f6e;--teal-s:#edf7f5;--teal-m:rgba(13,127,110,0.15);
  --violet:#5c35d9;--violet-s:#f2efff;--violet-m:rgba(92,53,217,0.15);
  --orange:#d06b00;--orange-s:#fff8ee;--orange-m:rgba(208,107,0,0.15);
  --text:#111827;--text2:#4b5563;--text3:#9ca3af;
  --sh:0 1px 3px rgba(0,0,0,0.06),0 4px 20px rgba(0,0,0,0.05);
  --sh-sm:0 1px 3px rgba(0,0,0,0.05);
  --sh-md:0 8px 30px rgba(0,0,0,0.1);
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Sora',sans-serif;min-height:100vh}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}

/* no spin, no scroll change */
input[type=number]{-moz-appearance:textfield;appearance:textfield}
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}

.layout{display:flex;min-height:100vh}

/* ‚îÄ‚îÄ SIDEBAR ‚îÄ‚îÄ */
.sidebar{
  width:264px;min-width:264px;background:var(--surface);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  position:sticky;top:0;height:100vh;z-index:50;
  box-shadow:2px 0 12px rgba(0,0,0,0.04);
}
.sb-top{padding:24px 20px 18px;border-bottom:1px solid var(--border)}
.logo{font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:700;color:var(--text);letter-spacing:-0.5px}
.logo em{color:var(--violet);font-style:normal}
.logo-sub{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--text3);margin-top:4px;font-family:'Space Mono',monospace}

.sb-lbl{font-size:9px;letter-spacing:2.5px;text-transform:uppercase;color:var(--text3);padding:16px 20px 8px;font-family:'Space Mono',monospace}
.sup-list{flex:1;overflow-y:auto;padding:4px 10px}

.sup-item{display:flex;align-items:center;gap:9px;padding:10px 11px;border-radius:12px;cursor:pointer;transition:all .16s;margin-bottom:3px;border:1px solid transparent}
.sup-item:hover{background:var(--surface2);border-color:var(--border)}
.sup-item.active{background:var(--violet-s);border-color:rgba(92,53,217,0.2)}

.sup-av{
  width:36px;height:36px;border-radius:10px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:700;
  background:var(--surface2);color:var(--text2);
  border:1px solid var(--border);transition:all .16s;
}
.sup-item.active .sup-av{background:var(--violet);color:#fff;border-color:var(--violet);box-shadow:0 3px 10px rgba(92,53,217,0.3)}

.sup-info{flex:1;min-width:0}
.sup-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
.sup-item.active .sup-name{color:var(--violet)}
.sup-net{font-size:11px;font-family:'Space Mono',monospace;margin-top:1px}

.sup-del{background:none;border:none;cursor:pointer;color:var(--text3);font-size:12px;padding:3px 5px;border-radius:5px;opacity:0;transition:all .14s;flex-shrink:0}
.sup-item:hover .sup-del{opacity:1}
.sup-del:hover{color:var(--rose);background:var(--rose-s)}

.add-sup{padding:12px;border-top:1px solid var(--border);display:flex;gap:7px}
.add-sup input{flex:1;background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;padding:9px 12px;font-size:13px;font-family:'Sora',sans-serif;color:var(--text);outline:none;transition:all .18s}
.add-sup input::placeholder{color:var(--text3)}
.add-sup input:focus{border-color:var(--violet);background:#fff;box-shadow:0 0 0 3px var(--violet-m)}
.add-btn{width:38px;height:38px;flex-shrink:0;background:var(--violet);color:#fff;border:none;border-radius:10px;font-size:21px;cursor:pointer;transition:all .16s;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 10px rgba(92,53,217,0.35);line-height:1}
.add-btn:hover{background:#4a27c0;box-shadow:0 5px 16px rgba(92,53,217,0.45);transform:translateY(-1px)}
.add-btn:active{transform:none}

/* ‚îÄ‚îÄ CONTENT ‚îÄ‚îÄ */
.content{flex:1;overflow-y:auto;min-width:0}
.topbar{
  background:rgba(255,255,255,0.9);border-bottom:1px solid var(--border);
  padding:0 30px;height:60px;display:flex;align-items:center;
  justify-content:space-between;position:sticky;top:0;z-index:40;
  backdrop-filter:blur(12px);box-shadow:var(--sh-sm);
}
.topbar-title{font-family:'Space Grotesk',sans-serif;font-size:19px;font-weight:700;color:var(--text)}
.pill{font-family:'Space Mono',monospace;font-size:12px;padding:6px 16px;border-radius:100px;font-weight:700;transition:all .25s;border:1.5px solid transparent}
.pill.owe{background:var(--rose-s);color:var(--rose);border-color:rgba(229,57,53,0.2)}
.pill.clear{background:var(--teal-s);color:var(--teal);border-color:rgba(13,127,110,0.2)}
.pill.zero{background:var(--surface2);color:var(--text3);border-color:var(--border)}

.main{padding:26px 30px}
.empty-sup{display:flex;flex-direction:column;align-items:center;justify-content:center;height:62vh;text-align:center;gap:14px}
.empty-ico{font-size:52px;opacity:0.22}
.empty-sup h2{font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:700;color:var(--text2)}
.empty-sup p{font-size:14px;color:var(--text3);max-width:270px;line-height:1.6}

/* ‚îÄ‚îÄ SUMMARY ‚îÄ‚îÄ */
.summary{display:grid;grid-template-columns:repeat(4,1fr);gap:13px;margin-bottom:26px}
.card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:16px;padding:18px 18px 16px;
  box-shadow:var(--sh-sm);transition:all .18s;cursor:default;
  position:relative;overflow:hidden;
}
.card:hover{transform:translateY(-3px);box-shadow:var(--sh)}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px}
.card-ico-wrap{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:19px}
.c-debt .card-ico-wrap{background:var(--rose-s)}
.c-paid .card-ico-wrap{background:var(--teal-s)}
.c-ret .card-ico-wrap{background:var(--violet-s)}
.c-bal .card-ico-wrap{background:var(--orange-s)}
.card-trend{font-size:10px;font-family:'Space Mono',monospace;padding:3px 7px;border-radius:20px;font-weight:700}
.c-debt .card-trend{background:var(--rose-s);color:var(--rose)}
.c-paid .card-trend{background:var(--teal-s);color:var(--teal)}
.c-ret .card-trend{background:var(--violet-s);color:var(--violet)}
.c-bal .card-trend{background:var(--orange-s);color:var(--orange)}
.card-lbl{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);font-weight:600;margin-bottom:5px;font-family:'Space Mono',monospace}
.card-amt{font-family:'Space Grotesk',sans-serif;font-size:24px;font-weight:700;line-height:1}
.c-debt .card-amt{color:var(--rose)}
.c-paid .card-amt{color:var(--teal)}
.c-ret .card-amt{color:var(--violet)}
.c-bal .card-amt{color:var(--orange)}
.card-sub{font-size:11px;color:var(--text3);margin-top:5px;font-family:'Space Mono',monospace}
.card-bar{position:absolute;bottom:0;left:0;right:0;height:3px;border-radius:0 0 16px 16px}
.c-debt .card-bar{background:linear-gradient(90deg,var(--rose),transparent)}
.c-paid .card-bar{background:linear-gradient(90deg,var(--teal),transparent)}
.c-ret .card-bar{background:linear-gradient(90deg,var(--violet),transparent)}
.c-bal .card-bar{background:linear-gradient(90deg,var(--orange),transparent)}

/* ‚îÄ‚îÄ COLUMNS ‚îÄ‚îÄ */
.cols{display:grid;grid-template-columns:1fr 1fr 1fr;gap:18px;margin-bottom:26px}
.col-head{display:flex;align-items:center;gap:8px;margin-bottom:13px;padding-bottom:11px;border-bottom:1.5px solid var(--border)}
.col-chip{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:4px 10px;border-radius:6px;font-family:'Space Mono',monospace}
.red .col-chip{background:var(--rose-s);color:var(--rose)}
.green .col-chip{background:var(--teal-s);color:var(--teal)}
.blue .col-chip{background:var(--violet-s);color:var(--violet)}
.col-title{font-size:14px;font-weight:600;color:var(--text)}

/* ‚îÄ‚îÄ FORM ‚îÄ‚îÄ */
.form{
  background:var(--surface);border:1.5px solid var(--border);
  border-radius:14px;padding:14px;margin-bottom:11px;
  display:flex;flex-direction:column;gap:9px;
  box-shadow:var(--sh-sm);transition:border-color .18s,box-shadow .18s;
}
.form:focus-within{border-color:rgba(92,53,217,0.3);box-shadow:0 0 0 4px var(--violet-m)}
.field label{display:block;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);font-weight:600;margin-bottom:4px;font-family:'Space Mono',monospace}

input[type=date],input[type=number],input[type=text]{
  width:100%;background:var(--surface2);
  border:1.5px solid var(--border);border-radius:9px;
  padding:9px 12px;color:var(--text);
  font-family:'Space Mono',monospace;font-size:13px;
  outline:none;transition:all .18s;
}
input::placeholder{color:var(--text3)}
input:focus{border-color:var(--violet);background:#fff;box-shadow:0 0 0 3px var(--violet-m)}
input[type=date]::-webkit-calendar-picker-indicator{opacity:0.4;cursor:pointer}

.pay-btns{display:flex;gap:6px}
.pay-btn{
  flex:1;padding:9px;border:1.5px solid var(--border);border-radius:9px;
  background:var(--surface2);color:var(--text3);
  font-family:'Sora',sans-serif;font-size:12px;font-weight:500;
  cursor:pointer;transition:all .16s;text-align:center;
}
.pay-btn:hover{border-color:rgba(13,127,110,0.3);color:var(--teal);background:var(--teal-s)}
.pay-btn.on{background:var(--teal-s);border-color:rgba(13,127,110,0.3);color:var(--teal);font-weight:600}

.btn{
  width:100%;padding:11px;border:none;border-radius:10px;
  font-family:'Sora',sans-serif;font-size:13px;font-weight:600;
  cursor:pointer;transition:all .16s;
}
.btn:hover{transform:translateY(-1px)}
.btn:active{transform:none;filter:brightness(0.95)}
.btn-red{background:var(--rose);color:#fff;box-shadow:0 3px 12px rgba(229,57,53,0.3)}
.btn-red:hover{background:#cc2a27;box-shadow:0 5px 18px rgba(229,57,53,0.4)}
.btn-green{background:var(--teal);color:#fff;box-shadow:0 3px 12px rgba(13,127,110,0.3)}
.btn-green:hover{background:#0a6457;box-shadow:0 5px 18px rgba(13,127,110,0.4)}
.btn-blue{background:var(--violet);color:#fff;box-shadow:0 3px 12px rgba(92,53,217,0.3)}
.btn-blue:hover{background:#4a27c0;box-shadow:0 5px 18px rgba(92,53,217,0.4)}

/* ‚îÄ‚îÄ ENTRIES ‚îÄ‚îÄ */
.entries{display:flex;flex-direction:column;gap:5px;max-height:340px;overflow-y:auto;padding-right:2px}
.entry{
  background:var(--surface);border:1px solid var(--border);
  border-radius:10px;padding:9px 12px;
  display:grid;grid-template-columns:70px 1fr auto auto;
  align-items:center;gap:8px;
  animation:si .2s cubic-bezier(.22,1,.36,1);
  transition:all .14s;box-shadow:var(--sh-sm);
}
.entry:hover{border-color:var(--border2);transform:translateX(3px);box-shadow:var(--sh)}
@keyframes si{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:translateX(0)}}
.e-date{font-family:'Space Mono',monospace;font-size:10px;color:var(--text3);background:var(--surface2);padding:3px 6px;border-radius:6px;text-align:center;border:1px solid var(--border);white-space:nowrap}
.e-note{font-size:12px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.e-amt{font-family:'Space Mono',monospace;font-size:13px;font-weight:700;white-space:nowrap}
.e-amt.red{color:var(--rose)}
.e-amt.green{color:var(--teal)}
.e-amt.blue{color:var(--violet)}
.del-btn{background:none;border:1.5px solid transparent;color:var(--text3);cursor:pointer;font-size:11px;padding:3px 6px;border-radius:6px;transition:all .14s;flex-shrink:0}
.del-btn:hover{color:var(--rose);background:var(--rose-s);border-color:rgba(229,57,53,0.2)}
.empty-st{text-align:center;padding:24px;color:var(--text3);font-size:11px;border:1.5px dashed var(--border);border-radius:10px;font-family:'Space Mono',monospace;background:var(--surface2)}

/* ‚îÄ‚îÄ FINAL ‚îÄ‚îÄ */
.final{
  background:var(--surface);border:1px solid var(--border);
  border-radius:18px;padding:24px 28px;
  display:flex;align-items:center;justify-content:space-between;
  box-shadow:var(--sh);position:relative;overflow:hidden;
}
.final-left-bar{position:absolute;left:0;top:0;bottom:0;width:4px;border-radius:18px 0 0 18px}
.final-left-bar.neg{background:var(--rose)}
.final-left-bar.zer{background:var(--teal)}
.final-left-bar.pos{background:var(--orange)}
.final-lbl{font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;color:var(--text3)}
.final-sub{font-size:12px;margin-top:5px;font-family:'Space Mono',monospace}
.final-amt{font-family:'Space Grotesk',sans-serif;font-size:48px;font-weight:700;line-height:1;text-align:right}
.final-amt.neg{color:var(--rose)}
.final-amt.zer{color:var(--teal)}
.final-amt.pos{color:var(--orange)}

/* ‚îÄ‚îÄ MODAL ‚îÄ‚îÄ */
.overlay{position:fixed;inset:0;background:rgba(17,24,39,0.4);z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;backdrop-filter:blur(6px)}
.overlay.show{opacity:1;pointer-events:all}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:34px 38px;max-width:380px;width:90%;box-shadow:0 20px 60px rgba(17,24,39,0.16);transform:scale(.93) translateY(14px);transition:transform .26s cubic-bezier(.22,1,.36,1);text-align:center}
.overlay.show .modal{transform:scale(1) translateY(0)}
.modal-ico{font-size:42px;margin-bottom:14px;display:block}
.modal-title{font-family:'Space Grotesk',sans-serif;font-size:21px;font-weight:700;margin-bottom:8px;color:var(--text)}
.modal-txt{font-size:14px;color:var(--text2);margin-bottom:26px;line-height:1.6}
.modal-acts{display:flex;gap:9px}
.modal-acts .btn{padding:11px;font-size:13px}
.btn-cancel{background:var(--surface2);color:var(--text2);border:1.5px solid var(--border);box-shadow:none}
.btn-cancel:hover{background:var(--border);transform:none;box-shadow:none}

@media(max-width:1060px){.summary{grid-template-columns:1fr 1fr}.cols{grid-template-columns:1fr}}
@media(max-width:720px){
  .layout{flex-direction:column}.sidebar{width:100%;height:auto;position:relative}
  .sup-list{max-height:150px}.summary{grid-template-columns:1fr 1fr}
  .main{padding:18px 14px}.final{flex-direction:column;gap:14px;text-align:center}
  .final-amt{text-align:center}
}
</style>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="sb-top">
      <div class="logo">Borc<em>Tracker</em></div>
      <div class="logo-sub">Maliyy…ô ƒ∞zl…ôyici</div>
    </div>
    <div class="sb-lbl">T…ôdar√ºk√ß√ºl…ôr</div>
    <div class="sup-list" id="supList"></div>
    <div class="add-sup">
      <input type="text" id="newSupName" placeholder="Yeni t…ôdar√ºk√ß√º..." maxlength="30">
      <button class="add-btn" onclick="addSup()">+</button>
    </div>
  </aside>
  <div class="content">
    <div class="topbar">
      <div class="topbar-title" id="topTitle">T…ôdar√ºk√ß√º se√ßin</div>
      <div class="pill zero" id="hPill">‚Äî</div>
    </div>
    <div class="main" id="mainContent">
      <div class="empty-sup">
        <div class="empty-ico">üè™</div>
        <h2>Xo≈ü g…ôldiniz</h2>
        <p>Sol paneld…ôn m√∂vcud t…ôdar√ºk√ß√º se√ßin v…ô ya yeni …ôlav…ô edin.</p>
      </div>
    </div>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <span class="modal-ico">üóëÔ∏è</span>
    <div class="modal-title">Silm…ôk ist…ôyirsiniz?</div>
    <div class="modal-txt" id="modalTxt">Bu …ôm…ôliyyat geri qaytarƒ±la bilm…ôz.</div>
    <div class="modal-acts">
      <button class="btn btn-cancel" onclick="closeModal()">L…ôƒüv et</button>
      <button class="btn btn-red" onclick="confirmDel()">B…ôli, sil</button>
    </div>
  </div>
</div>

<script>
var S={suppliers:[],cur:null},PD=null;
function load(){
  try{var d=localStorage.getItem('bt6');if(d)S=JSON.parse(d);}catch(e){}
  if(!S.suppliers||!S.suppliers.length)S.suppliers=[mkSup('HomeStore')];
}
function save(){localStorage.setItem('bt6',JSON.stringify(S));}
function mkSup(n){return{id:Date.now()+Math.random(),name:n,debts:[],payments:[],returns:[]};}
function getSup(id){return S.suppliers.find(function(s){return s.id==id;});}
function today(){return new Date().toISOString().split('T')[0];}
function fd(s){var p=s.split('-');return p[2]+'.'+p[1]+'.'+p[0];}
function fmt(n){return n.toLocaleString('az-AZ',{minimumFractionDigits:2,maximumFractionDigits:2})+' ‚Çº';}

function addSup(){
  var inp=document.getElementById('newSupName'),n=inp.value.trim();
  if(!n)return;var s=mkSup(n);S.suppliers.push(s);inp.value='';
  save();renderSidebar();selSup(s.id);
}
function delSupConf(id,e){
  e.stopPropagation();var s=getSup(id);PD={sid:id,type:'supplier'};
  document.getElementById('modalTxt').textContent='"'+s.name+'" silin…ôc…ôk. B√ºt√ºn m…ôlumatlar it…ôc…ôk.';
  openModal();
}
function selSup(id){S.cur=id;renderSidebar();renderMain();}

function renderSidebar(){
  var el=document.getElementById('supList');
  if(!S.suppliers.length){el.innerHTML='<div style="padding:16px;font-size:12px;color:var(--text3);text-align:center">H…ôl…ô yoxdur</div>';return;}
  el.innerHTML=S.suppliers.map(function(s){
    var td=s.debts.reduce(function(a,e){return a+e.amount;},0);
    var tp=s.payments.reduce(function(a,e){return a+e.amount;},0);
    var tr=s.returns.reduce(function(a,e){return a+e.amount;},0);
    var net=td-tp-tr;
    var ns=net>0.001?'color:var(--rose)':net<-0.001?'color:var(--teal)':'color:var(--text3)';
    var nt=net>0.001?'‚àí'+fmt(net):net<-0.001?'+'+fmt(Math.abs(net)):'0.00 ‚Çº';
    var ac=s.id==S.cur?' active':'';
    return '<div class="sup-item'+ac+'" onclick="selSup('+s.id+')">'+
      '<div class="sup-av">'+s.name.charAt(0).toUpperCase()+'</div>'+
      '<div class="sup-info"><div class="sup-name">'+s.name+'</div><div class="sup-net" style="'+ns+'">'+nt+'</div></div>'+
      '<button class="sup-del" onclick="delSupConf('+s.id+',event)">‚úï</button></div>';
  }).join('');
}

function renderMain(){
  var s=getSup(S.cur),el=document.getElementById('mainContent');
  var tt=document.getElementById('topTitle'),hp=document.getElementById('hPill');
  if(!s){
    tt.textContent='T…ôdar√ºk√ß√º se√ßin';hp.textContent='‚Äî';hp.className='pill zero';
    el.innerHTML='<div class="empty-sup"><div class="empty-ico">üè™</div><h2>Xo≈ü g…ôldiniz</h2><p>Sol paneld…ôn m√∂vcud t…ôdar√ºk√ß√º se√ßin v…ô ya yeni …ôlav…ô edin.</p></div>';
    return;
  }
  tt.textContent=s.name;
  var td=s.debts.reduce(function(a,e){return a+e.amount;},0);
  var tp=s.payments.reduce(function(a,e){return a+e.amount;},0);
  var tr=s.returns.reduce(function(a,e){return a+e.amount;},0);
  var net=td-tp-tr;
  if(net>0.001){hp.textContent='Borc: '+fmt(net);hp.className='pill owe';}
  else if(net<-0.001){hp.textContent='Artƒ±q: '+fmt(Math.abs(net));hp.className='pill clear';}
  else{hp.textContent='Borc yoxdur ‚úì';hp.className='pill zero';}
  var fc=net>0.001?'neg':net<-0.001?'pos':'zer';
  var fsub_color=net>0.001?'var(--rose)':net<-0.001?'var(--orange)':'var(--teal)';
  var fst=net>0.001?s.name+'-…ô '+fmt(net)+' borclusunuz':net<-0.001?s.name+' siz…ô '+fmt(Math.abs(net))+' borcludur':'Hesab sƒ±fƒ±rdƒ±r ‚úì';
  var bsub=net>0.001?'borc var':net<-0.001?'artƒ±q √∂d…ônilib':'b…ôrab…ôr';

  el.innerHTML=
    '<div class="summary">'+
      '<div class="card c-debt"><div class="card-top"><div class="card-ico-wrap">üì¶</div><div class="card-trend">BORC</div></div><div class="card-lbl">Alƒ±nan mal</div><div class="card-amt">'+fmt(td)+'</div><div class="card-sub">'+s.debts.length+' …ôm…ôliyyat</div><div class="card-bar"></div></div>'+
      '<div class="card c-paid"><div class="card-top"><div class="card-ico-wrap">üí≥</div><div class="card-trend">√ñD∆èNƒ∞≈û</div></div><div class="card-lbl">√ñd…ôdiyim</div><div class="card-amt">'+fmt(tp)+'</div><div class="card-sub">'+s.payments.length+' …ôm…ôliyyat</div><div class="card-bar"></div></div>'+
      '<div class="card c-ret"><div class="card-top"><div class="card-ico-wrap">‚Ü©Ô∏è</div><div class="card-trend">QAYTARMA</div></div><div class="card-lbl">Geri qaytarma</div><div class="card-amt">'+fmt(tr)+'</div><div class="card-sub">'+s.returns.length+' …ôm…ôliyyat</div><div class="card-bar"></div></div>'+
      '<div class="card c-bal"><div class="card-top"><div class="card-ico-wrap">‚öñÔ∏è</div><div class="card-trend">QALƒ±Q</div></div><div class="card-lbl">Qalƒ±q borc</div><div class="card-amt">'+fmt(Math.abs(net))+'</div><div class="card-sub">'+bsub+'</div><div class="card-bar"></div></div>'+
    '</div>'+
    '<div class="cols">'+
      col('red','üì• BORC',s.name+' g√∂nd…ôrdi',
        f('Tarix','<input type="date" id="dDate" value="'+today()+'">')+
        f('M…ôbl…ôƒü (‚Çº)','<input type="number" id="dAmt" placeholder="0.00" min="0" step="0.01" onwheel="this.blur()">')+
        f('Qeyd','<input type="text" id="dNote" placeholder="M…ôhsul, sifari≈ü ‚Ññ...">')+
        '<button class="btn btn-red" onclick="addEntry(\'debt\')">+ Borc …ôlav…ô et</button>',
        entries(s.debts,'debt','red'))+
      col('green','üí≥ √ñD∆èNƒ∞≈û','M…ôn √∂d…ôdim',
        f('Tarix','<input type="date" id="pDate" value="'+today()+'">')+
        f('M…ôbl…ôƒü (‚Çº)','<input type="number" id="pAmt" placeholder="0.00" min="0" step="0.01" onwheel="this.blur()">')+
        f('√ñd…ôni≈ü √ºsulu','<div class="pay-btns"><button type="button" id="bN" class="pay-btn on" onclick="selPay(\'nagd\')">üíµ Naƒüd</button><button type="button" id="bK" class="pay-btn" onclick="selPay(\'kart\')">üí≥ Kart</button></div><input type="hidden" id="pNote" value="Naƒüd">')+
        '<button class="btn btn-green" onclick="addEntry(\'paid\')">+ √ñd…ôni≈ü …ôlav…ô et</button>',
        entries(s.payments,'paid','green'))+
      col('blue','‚Ü© QAYTARMA','Geri qaytarma',
        f('Tarix','<input type="date" id="rDate" value="'+today()+'">')+
        f('M…ôbl…ôƒü (‚Çº)','<input type="number" id="rAmt" placeholder="0.00" min="0" step="0.01" onwheel="this.blur()">')+
        f('S…ôb…ôb','<input type="text" id="rNote" placeholder="Uyƒüun g…ôlmir, z…ôd…ôli...">')+
        '<button class="btn btn-blue" onclick="addEntry(\'return\')">‚Ü© Geri qaytarma …ôlav…ô et</button>',
        entries(s.returns,'return','blue'))+
    '</div>'+
    '<div class="final"><div class="final-left-bar '+fc+'"></div>'+
      '<div><div class="final-lbl">√úmumi V…ôziyy…ôt</div><div class="final-sub" style="color:'+fsub_color+'">'+fst+'</div></div>'+
      '<div><div class="final-amt '+fc+'">'+fmt(Math.abs(net))+'</div></div>'+
    '</div>';
}

function f(l,i){return'<div class="field"><label>'+l+'</label>'+i+'</div>';}
function col(color,chip,title,formHtml,entriesHtml){
  return'<div><div class="col-head '+color+'"><div class="col-chip">'+chip+'</div><div class="col-title">'+title+'</div></div><div class="form">'+formHtml+'</div><div class="entries">'+entriesHtml+'</div></div>';
}
function entries(list,type,cls){
  if(!list.length)return'<div class="empty-st">‚Äî QEYD YOXDUR ‚Äî</div>';
  return list.map(function(e){
    return'<div class="entry"><div class="e-date">'+fd(e.date)+'</div><div class="e-note">'+(e.note||'‚Äî')+'</div><div class="e-amt '+cls+'">'+fmt(e.amount)+'</div><button class="del-btn" onclick="askDel(\''+type+'\','+e.id+')">‚úï</button></div>';
  }).join('');
}
function addEntry(type){
  var s=getSup(S.cur);if(!s)return;
  var date,amount,note;
  if(type==='debt'){date=document.getElementById('dDate').value;amount=parseFloat(document.getElementById('dAmt').value);note=document.getElementById('dNote').value.trim();}
  else if(type==='paid'){date=document.getElementById('pDate').value;amount=parseFloat(document.getElementById('pAmt').value);note=document.getElementById('pNote').value;}
  else{date=document.getElementById('rDate').value;amount=parseFloat(document.getElementById('rAmt').value);note=document.getElementById('rNote').value.trim();}
  if(!date){alert('Tarix se√ßin');return;}
  if(!amount||amount<=0){alert('D√ºzg√ºn m…ôbl…ôƒü daxil edin');return;}
  var entry={id:Date.now(),date:date,amount:amount,note:note};
  if(type==='debt'){s.debts.push(entry);s.debts.sort(function(a,b){return a.date.localeCompare(b.date);});}
  else if(type==='paid'){s.payments.push(entry);s.payments.sort(function(a,b){return a.date.localeCompare(b.date);});}
  else{s.returns.push(entry);s.returns.sort(function(a,b){return a.date.localeCompare(b.date);});}
  save();renderSidebar();renderMain();
}
function selPay(m){
  document.getElementById('pNote').value=m==='nagd'?'Naƒüd':'Kart';
  document.getElementById('bN').className='pay-btn'+(m==='nagd'?' on':'');
  document.getElementById('bK').className='pay-btn'+(m==='kart'?' on':'');
}
function askDel(type,eid){
  PD={sid:S.cur,type:type,eid:eid};
  var lb={debt:'borc',paid:'√∂d…ôni≈ü',return:'geri qaytarma'};
  document.getElementById('modalTxt').textContent='Bu '+lb[type]+' qeydi h…ômi≈ü…ôlik silin…ôc…ôk.';
  openModal();
}
function confirmDel(){
  if(!PD){closeModal();return;}
  if(PD.type==='supplier'){
    S.suppliers=S.suppliers.filter(function(s){return s.id!=PD.sid;});
    if(S.cur==PD.sid)S.cur=null;
  }else{
    var s=getSup(PD.sid);
    if(s){
      if(PD.type==='debt')s.debts=s.debts.filter(function(e){return e.id!=PD.eid;});
      else if(PD.type==='paid')s.payments=s.payments.filter(function(e){return e.id!=PD.eid;});
      else if(PD.type==='return')s.returns=s.returns.filter(function(e){return e.id!=PD.eid;});
    }
  }
  PD=null;save();closeModal();renderSidebar();renderMain();
}
function openModal(){document.getElementById('overlay').classList.add('show');}
function closeModal(){document.getElementById('overlay').classList.remove('show');PD=null;}
document.getElementById('overlay').addEventListener('click',function(e){if(e.target===this)closeModal();});
document.getElementById('newSupName').addEventListener('keydown',function(e){if(e.key==='Enter')addSup();});
load();renderSidebar();
if(S.suppliers.length)selSup(S.suppliers[0].id);
</script>
